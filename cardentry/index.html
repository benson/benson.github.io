<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>card entry</title>
<link rel="stylesheet" href="https://bensonperry.com/shared/common.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Times New Roman", Times, Georgia, serif;
    background: #f8f7f4;
    color: #000;
    min-height: 100vh;
    text-transform: lowercase;
    font-size: 0.9rem;
  }

  .header {
    padding: 30px 30px 0;
  }
  .header h1 { font-size: 1.5rem; font-weight: 400; letter-spacing: -0.02em; }
  .header p { color: #999; font-size: 0.75rem; margin-top: 2px; letter-spacing: 0.03em; }

  .main { max-width: 720px; margin: 0 auto; padding: 20px 30px; }

  /* Entry form */
  .entry-row {
    display: flex;
    gap: 8px;
    align-items: end;
    flex-wrap: wrap;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .field label {
    font-size: 0.7rem;
    letter-spacing: 0.03em;
    color: #999;
  }
  .field input, .field select {
    background: transparent;
    border: none;
    border-bottom: 1px solid #000;
    color: #000;
    padding: 6px 2px;
    font-size: 0.9rem;
    font-family: inherit;
    text-transform: lowercase;
    outline: none;
    border-radius: 0;
    -webkit-appearance: none;
  }
  .field select { padding-right: 16px; }
  .field input:focus, .field select:focus { border-bottom-width: 2px; }
  .field input::placeholder { color: #ccc; }
  .field-set { width: 70px; }
  .field-cn { width: 70px; }
  .field-qty { width: 50px; }

  .btn {
    padding: 8px 16px;
    border: 1px solid #000;
    border-radius: 2px;
    font-size: 0.8rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: lowercase;
    background: #000;
    color: #fff;
  }
  .btn:hover { background: #333; }
  .btn:disabled { background: #ccc; border-color: #ccc; cursor: default; }
  .btn-secondary {
    background: transparent;
    color: #000;
  }
  .btn-secondary:hover { background: #eee; }
  .btn-danger {
    background: transparent;
    color: #999;
    border-color: #ccc;
  }
  .btn-danger:hover { color: #c00; border-color: #c00; }

  /* Mic (hero) */
  .mic-section {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0 12px;
  }
  .mic-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
    font-size: 20px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .mic-btn:hover { border-color: #000; }
  .mic-btn.on {
    background: #c00;
    border-color: #c00;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .manual-toggle { margin-bottom: 8px; }
  .link-btn {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 0.75rem;
    color: #999;
    cursor: pointer;
    text-transform: lowercase;
    border-bottom: 1px solid #ccc;
    padding: 0;
  }
  .link-btn:hover { color: #000; border-bottom-color: #000; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 rgba(204, 0, 0, 0); }
    50% { box-shadow: 0 0 12px rgba(204, 0, 0, 0.3); }
  }
  .mic-status { font-size: 0.75rem; color: #999; }
  .mic-status strong { color: #000; }

  /* Preview card */
  .preview {
    display: none;
    gap: 16px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #eee;
  }
  .preview.active { display: flex; }
  .preview-img {
    width: 140px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .preview-info { flex: 1; min-width: 0; }
  .preview-name { font-size: 1.1rem; font-weight: 400; margin-bottom: 2px; text-transform: none; }
  .preview-meta { font-size: 0.75rem; color: #999; margin-bottom: 10px; }
  .preview-fields {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .preview-actions { display: flex; gap: 6px; }

  /* Feedback */
  .feedback {
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 2px;
    margin-top: 12px;
    display: none;
  }
  .feedback.active { display: block; }
  .feedback.error { background: #fff0f0; border: 1px solid #e8c0c0; color: #900; }
  .feedback.info { background: #f0f4ff; border: 1px solid #c0d0e8; color: #336; }
  .feedback.success { background: #f0fff0; border: 1px solid #c0e8c0; color: #060; }

  /* Stats */
  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
  }
  .stat-label { font-size: 0.7rem; letter-spacing: 0.03em; color: #999; }
  .stat-value { font-size: 1.5rem; font-weight: 400; }

  /* Table */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead th {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid #000;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    color: #999;
  }
  tbody tr { border-bottom: 1px solid #eee; }
  td { padding: 6px 8px; }
  .card-name-cell { text-transform: none; }
  .muted { color: #999; }
  .btn-sm {
    padding: 2px 6px;
    font-size: 0.75rem;
    background: transparent;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-family: inherit;
  }
  .btn-sm:hover { color: #000; }
  .btn-sm.delete:hover { color: #c00; }

  .actions-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #ccc;
    font-size: 0.85rem;
  }

  .loading-spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 1.5px solid #ccc;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.5s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none; }
  .source-tag { color: #999; font-size: 0.7rem; font-style: italic; }
  .divider { border-top: 1px solid #eee; margin: 20px 0; }

  /* Mobile */
  @media (max-width: 600px) {
    .header { padding: 20px 15px 0; }
    .main { padding: 15px; }
    .entry-row { gap: 6px; }
    .field-set, .field-cn { width: 60px; }
    .preview { flex-direction: column; }
    .preview-img { width: 100%; max-width: 200px; }
    .preview-fields { gap: 6px; }
    .preview-fields .field { min-width: 0; flex: 1 1 45%; }
    .preview-fields .field-qty { flex: 0 0 50px; }
    .stats { gap: 12px; }
    .actions-bar { gap: 4px; }
    .actions-bar .btn { font-size: 0.7rem; padding: 6px 10px; flex: 1; text-align: center; }
    table { font-size: 0.7rem; }
    thead th, td { padding: 4px 4px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>card entry</h1>
  <p>set code + collector number — tcg player listings</p>
</div>

<div class="main">
  <!-- Voice (primary) -->
  <div class="mic-section">
    <button class="mic-btn off" id="micBtn" onclick="toggleMic()">&#127908;</button>
    <div class="mic-status" id="micStatus">tap to start — say "dsk 260 foil promo"</div>
  </div>

  <!-- Manual entry (collapsed) -->
  <div class="manual-toggle">
    <button class="link-btn" onclick="document.getElementById('manualEntry').classList.toggle('hidden'); this.textContent = this.textContent === 'manual entry' ? 'hide' : 'manual entry'">manual entry</button>
  </div>
  <div class="entry-row hidden" id="manualEntry">
    <div class="field field-set">
      <label>set</label>
      <input type="text" id="setInput" placeholder="fin" maxlength="5"
        autocomplete="off" spellcheck="false">
    </div>
    <div class="field field-cn">
      <label>cn</label>
      <input type="text" id="cnInput" placeholder="142" maxlength="6"
        autocomplete="off" spellcheck="false">
    </div>
    <button class="btn" id="lookupBtn" onclick="doLookup()">look up</button>
  </div>

  <!-- Preview -->
  <div class="preview" id="preview">
    <img class="preview-img" id="previewImg" src="" alt="">
    <div class="preview-info">
      <div class="preview-name" id="previewName"></div>
      <div class="preview-meta" id="previewMeta"></div>
      <div class="preview-fields">
        <div class="field">
          <label>printing</label>
          <select id="previewPrinting"></select>
        </div>
        <div class="field">
          <label>condition</label>
          <select id="previewCondition"></select>
        </div>
        <div class="field">
          <label>source</label>
          <select id="previewSource">
            <option value="regular">regular</option>
            <option value="promo">promo pack</option>
            <option value="prerelease">prerelease</option>
          </select>
        </div>
        <div class="field">
          <label>language</label>
          <select id="previewLanguage"></select>
        </div>
        <div class="field field-qty">
          <label>qty</label>
          <input type="number" id="previewQty" min="1" value="1">
        </div>
      </div>
      <div class="preview-actions">
        <button class="btn" onclick="addCard()">add to list</button>
        <button class="btn btn-secondary" onclick="clearPreview()">skip</button>
      </div>
    </div>
  </div>

  <!-- Feedback -->
  <div class="feedback" id="feedback"></div>

  <div class="divider"></div>

  <!-- Stats & Table -->
  <div id="listSection" class="hidden">
    <div class="stats">
      <div>
        <div class="stat-label">unique cards</div>
        <div class="stat-value" id="uniqueCount">0</div>
      </div>
      <div>
        <div class="stat-label">total quantity</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
    </div>

    <div class="actions-bar">
      <button class="btn" id="submitBtn" onclick="submitToStore()">submit to store</button>
      <button class="btn btn-secondary" onclick="copyList()">copy list</button>
      <button class="btn btn-secondary" onclick="exportCSV()">export csv</button>
      <button class="btn btn-danger" onclick="clearAll()">clear all</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>card</th>
            <th>set</th>
            <th>cn</th>
            <th>printing</th>
            <th>condition</th>
            <th>qty</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cardTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <p>no cards yet — enter a set code and collector number to start</p>
  </div>
</div>

<footer><a href="/">bensonperry.com</a></footer>

<script type="module">
import {
  fetchCardByCollectorNumber,
  fetchCardByName,
  getCardFinishes,
  getCardImageUrl,
  getCardPrintingType,
  TCG_CONDITIONS,
  TCG_PRINTINGS,
  TCG_LANGUAGES,
} from 'https://bensonperry.com/shared/mtg.js';

// ---- State ----
let cards = [];
let nextId = 1;
let currentCard = null;

// ---- Persistence ----
const STORAGE_KEY = 'cardentry_cards';
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ cards, nextId }));
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data.cards)) {
      cards = data.cards;
      nextId = data.nextId || (cards.length ? Math.max(...cards.map(c => c.id)) + 1 : 1);
    }
  } catch (e) {}
}

// ---- DOM refs ----
const setInput = document.getElementById('setInput');
const cnInput = document.getElementById('cnInput');
const lookupBtn = document.getElementById('lookupBtn');
const preview = document.getElementById('preview');
const feedbackEl = document.getElementById('feedback');

const conditionSelect = document.getElementById('previewCondition');
TCG_CONDITIONS.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c; opt.textContent = c.toLowerCase();
  conditionSelect.appendChild(opt);
});

const langSelect = document.getElementById('previewLanguage');
TCG_LANGUAGES.forEach(l => {
  const opt = document.createElement('option');
  opt.value = l; opt.textContent = l.toLowerCase();
  langSelect.appendChild(opt);
});

// ---- Lookup ----
async function doLookup() {
  const set = setInput.value.trim();
  const cn = cnInput.value.trim();
  if (!set || !cn) {
    showFeedback('enter both set code and collector number', 'error');
    return;
  }

  lookupBtn.disabled = true;
  showFeedback('<span class="loading-spinner"></span> looking up ' + set + ' #' + cn + '...', 'info');

  const card = await fetchCardByCollectorNumber(set, cn);

  lookupBtn.disabled = false;

  if (!card) {
    showFeedback('no card found for ' + set + ' #' + cn, 'error');
    return;
  }

  showCardPreview(card);
  hideFeedback();
  document.getElementById('previewQty').select();
}
window.doLookup = doLookup;

function showCardPreview(card) {
  currentCard = card;
  preview.classList.add('active');

  document.getElementById('previewImg').src = getCardImageUrl(card, 'normal') || '';
  document.getElementById('previewName').textContent = card.name;

  const meta = [card.set_name, card.type_line, card.rarity].filter(Boolean).join(' — ');
  document.getElementById('previewMeta').textContent = meta;

  const printingSelect = document.getElementById('previewPrinting');
  printingSelect.innerHTML = '';
  const finishes = getCardFinishes(card);
  for (const f of finishes) {
    const label = getCardPrintingType(card, f.finish);
    const priceStr = f.price ? ' ($' + f.price + ')' : '';
    const opt = document.createElement('option');
    opt.value = f.finish;
    opt.textContent = (label + priceStr).toLowerCase();
    printingSelect.appendChild(opt);
  }

  document.getElementById('previewQty').value = 1;
  const source = window._voiceSource || 'regular';
  document.getElementById('previewSource').value = source;
  if (window._voiceFoil) {
    const sel = document.getElementById('previewPrinting');
    for (const opt of sel.options) {
      if (opt.value === 'foil') { sel.value = 'foil'; break; }
    }
  }
  window._voiceSource = 'regular';
  window._voiceFoil = false;

  // Fetch promo stamp image if applicable
  updatePromoImage(card, source);
}

// Fetch the stamped promo image from Scryfall (p{set}/{cn}s)
async function updatePromoImage(card, source) {
  const imgEl = document.getElementById('previewImg');
  if (source === 'regular') {
    imgEl.src = getCardImageUrl(card, 'normal') || '';
    return;
  }
  const promoSet = 'p' + card.set;
  const promoCn = card.collector_number + 's';
  try {
    const promoCard = await fetchCardByCollectorNumber(promoSet, promoCn);
    if (promoCard) {
      imgEl.src = getCardImageUrl(promoCard, 'normal') || imgEl.src;
    }
  } catch (e) {
    // Fall back to regular image silently
  }
}

function clearPreview() {
  currentCard = null;
  preview.classList.remove('active');
  window._voiceSource = 'regular';
  setInput.value = '';
  cnInput.value = '';
  setInput.focus();
}
window.clearPreview = clearPreview;

// ---- Add card ----
function addCard() {
  if (!currentCard) return;

  const finish = document.getElementById('previewPrinting').value;
  const entry = {
    id: nextId++,
    name: currentCard.name,
    set: currentCard.set.toUpperCase(),
    setName: currentCard.set_name,
    cn: currentCard.collector_number,
    printing: getCardPrintingType(currentCard, finish),
    source: document.getElementById('previewSource').value,
    condition: conditionSelect.value,
    language: langSelect.value,
    quantity: Math.max(1, parseInt(document.getElementById('previewQty').value, 10) || 1),
    scryfallId: currentCard.id,
  };

  cards.push(entry);
  save();
  renderTable();
  showFeedback('added ' + entry.name + ' (' + entry.set + ' #' + entry.cn + ')', 'success');

  const prevSet = setInput.value;
  clearPreview();
  setInput.value = prevSet;
  cnInput.focus();
}
window.addCard = addCard;

// ---- Table rendering ----
function renderTable() {
  const tbody = document.getElementById('cardTableBody');
  const listSection = document.getElementById('listSection');
  const emptyState = document.getElementById('emptyState');

  if (cards.length === 0) {
    listSection.classList.add('hidden');
    emptyState.classList.remove('hidden');
    return;
  }

  listSection.classList.remove('hidden');
  emptyState.classList.add('hidden');

  document.getElementById('uniqueCount').textContent = cards.length;
  document.getElementById('totalCount').textContent = cards.reduce((s, c) => s + c.quantity, 0);

  tbody.innerHTML = cards.map(c => `
    <tr>
      <td class="card-name-cell">${esc(c.name)}${c.source !== 'regular' ? ' <span class="source-tag">(' + esc(c.source) + ')</span>' : ''}</td>
      <td class="muted">${esc(c.set)}</td>
      <td class="muted">${esc(c.cn)}</td>
      <td class="muted">${esc(c.printing)}</td>
      <td class="muted">${esc(c.condition)}</td>
      <td>${c.quantity}</td>
      <td><button class="btn-sm delete" onclick="deleteCard(${c.id})">x</button></td>
    </tr>
  `).join('');
}

function deleteCard(id) {
  cards = cards.filter(c => c.id !== id);
  save();
  renderTable();
}
window.deleteCard = deleteCard;

// ---- Export ----
function copyList() {
  const lines = cards.map(c =>
    [c.quantity, c.name, c.set, '#' + c.cn, c.printing, c.condition, c.language].join('\t')
  );
  navigator.clipboard.writeText(lines.join('\n'));
  showFeedback('copied ' + cards.length + ' cards to clipboard', 'success');
}
window.copyList = copyList;

function exportCSV() {
  const header = 'Quantity,Name,Set,Collector Number,Printing,Condition,Language';
  const rows = cards.map(c =>
    [c.quantity, '"' + c.name + '"', c.set, c.cn, c.printing, c.condition, c.language].join(',')
  );
  const csv = header + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'tcg-cards.csv'; a.click();
  URL.revokeObjectURL(url);
}
window.exportCSV = exportCSV;

const QUEUE_URL = 'https://cardentry-queue.bensonperry.workers.dev';

async function submitToStore() {
  if (cards.length === 0) {
    showFeedback('no cards to submit', 'error');
    return;
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'submitting...';
  try {
    const resp = await fetch(QUEUE_URL + '/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cards }),
    });
    const data = await resp.json();
    if (data.ok) {
      showFeedback('submitted ' + data.count + ' cards to store queue (id: ' + data.id + ')', 'success');
      cards = [];
      nextId = 1;
      save();
      renderTable();
    } else {
      showFeedback('submit failed: ' + (data.error || 'unknown'), 'error');
    }
  } catch (e) {
    showFeedback('submit failed: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = 'submit to store';
}
window.submitToStore = submitToStore;

function clearAll() {
  if (cards.length && !confirm('clear all ' + cards.length + ' cards?')) return;
  cards = [];
  nextId = 1;
  save();
  renderTable();
}
window.clearAll = clearAll;

// ---- Feedback ----
function showFeedback(html, type = 'info') {
  feedbackEl.innerHTML = html;
  feedbackEl.className = 'feedback active ' + type;
}

function hideFeedback() {
  feedbackEl.className = 'feedback';
}

// ---- Voice ----
let isListening = false;
let recognition = null;
let pendingTranscript = '';
let debounceTimer = null;
const DEBOUNCE_MS = 1200;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    let final = '';
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t + ' ';
      else interim += t;
    }
    if (final.trim()) {
      pendingTranscript += final;
      document.getElementById('micStatus').innerHTML =
        '<strong>heard:</strong> ' + esc(pendingTranscript.trim());

      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const text = pendingTranscript.trim();
        pendingTranscript = '';
        if (text.length > 1) parseVoice(text);
      }, DEBOUNCE_MS);
    }
    if (interim) {
      document.getElementById('micStatus').innerHTML =
        '<strong>...</strong> ' + esc((pendingTranscript + interim).trim());
    }
  };

  recognition.onend = () => {
    if (isListening) { try { recognition.start(); } catch(e) {} }
  };

  recognition.onerror = (event) => {
    if (event.error === 'not-allowed') {
      document.getElementById('micStatus').textContent = 'mic access denied — allow and reload';
    }
  };
}

function toggleMic() {
  if (!recognition) return;
  const btn = document.getElementById('micBtn');
  if (isListening) {
    isListening = false;
    recognition.stop();
    btn.className = 'mic-btn off';
    document.getElementById('micStatus').textContent = 'mic off';
  } else {
    isListening = true;
    recognition.start();
    btn.className = 'mic-btn on';
    document.getElementById('micStatus').textContent = 'listening...';
  }
}
window.toggleMic = toggleMic;

function parseVoice(text) {
  const clean = text.toLowerCase()
    .replace(/\b(um|uh|uhh|okay|ok)\b/g, '')
    .replace(/number\s*/g, '')
    .replace(/hashtag\s*/g, '')
    .replace(/pound\s*/g, '')
    .replace(/hash\s*/g, '')
    .replace(/\s+/g, ' ')
    .trim();

  const match = clean.match(/^([a-z]{2,5})\s*(\d{1,4}[a-z]?)\b/);
  if (match) {
    setInput.value = match[1];
    cnInput.value = match[2];

    const rest = clean.slice(match[0].length);
    window._voiceFoil = /\bfoil\b/.test(rest);
    if (/\b(prerelease|pre-release|pre release|date\s*stamp)\b/.test(rest)) {
      window._voiceSource = 'prerelease';
    } else if (/\b(promo|stamp|stamped)\b/.test(rest)) {
      window._voiceSource = 'promo';
    } else {
      window._voiceSource = 'regular';
    }

    doLookup();
  } else {
    showFeedback('couldn\'t parse "' + esc(text) + '" — say set code then number (e.g. "fin 142")', 'error');
  }
}

// ---- Keyboard shortcuts ----
setInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (cnInput.value.trim()) doLookup();
    else cnInput.focus();
  }
});
cnInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLookup();
});
document.getElementById('previewQty').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCard();
});
document.getElementById('previewSource').addEventListener('change', e => {
  if (currentCard) updatePromoImage(currentCard, e.target.value);
});

// ---- Util ----
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Load saved cards and focus
load();
renderTable();
setInput.focus();
</script>
</body>
</html>
