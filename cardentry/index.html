<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mtg card entry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
  }

  .header {
    background: #1e293b;
    border-bottom: 1px solid #334155;
    padding: 20px 24px;
  }
  .header h1 { font-size: 22px; font-weight: 600; text-transform: lowercase; }
  .header p { color: #94a3b8; font-size: 13px; margin-top: 2px; }

  .main { max-width: 960px; margin: 0 auto; padding: 20px; }

  .panel {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  /* Entry form */
  .entry-row {
    display: flex;
    gap: 10px;
    align-items: end;
    flex-wrap: wrap;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #94a3b8;
    font-weight: 600;
  }
  .field input, .field select {
    background: #334155;
    border: 1px solid #475569;
    color: #f1f5f9;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: #3b82f6; }
  .field input::placeholder { color: #64748b; }
  .field-set { width: 80px; }
  .field-cn { width: 80px; }
  .field-qty { width: 60px; }

  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: lowercase;
  }
  .btn-lookup {
    background: #2563eb;
    color: white;
    padding: 8px 20px;
  }
  .btn-lookup:hover { background: #1d4ed8; }
  .btn-lookup:disabled { opacity: 0.5; cursor: default; }

  /* Mic */
  .mic-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #334155;
  }
  .mic-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .mic-btn.off { background: #475569; }
  .mic-btn.off:hover { background: #64748b; }
  .mic-btn.on {
    background: #dc2626;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 rgba(220, 38, 38, 0); }
    50% { box-shadow: 0 0 20px rgba(220, 38, 38, 0.4); }
  }
  .mic-status { font-size: 13px; color: #94a3b8; }
  .mic-status strong { color: #f1f5f9; }

  /* Preview card */
  .preview {
    display: none;
    gap: 20px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #334155;
  }
  .preview.active { display: flex; }
  .preview-img {
    width: 180px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .preview-info { flex: 1; min-width: 0; }
  .preview-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .preview-meta { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
  .preview-fields {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .preview-actions { display: flex; gap: 8px; }
  .btn-add {
    background: #16a34a;
    color: white;
  }
  .btn-add:hover { background: #15803d; }
  .btn-skip {
    background: #475569;
    color: #e2e8f0;
  }
  .btn-skip:hover { background: #64748b; }

  /* Feedback */
  .feedback {
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 6px;
    margin-top: 12px;
    display: none;
  }
  .feedback.active { display: block; }
  .feedback.error { background: rgba(220, 38, 38, 0.15); border: 1px solid #7f1d1d; color: #fca5a5; }
  .feedback.info { background: rgba(37, 99, 235, 0.15); border: 1px solid #1e3a5f; color: #93c5fd; }
  .feedback.success { background: rgba(22, 163, 74, 0.15); border: 1px solid #14532d; color: #86efac; }

  /* Stats */
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
  }
  .stat {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 12px 16px;
    flex: 1;
  }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; }
  .stat-value { font-size: 24px; font-weight: 700; margin-top: 2px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid #334155;
    color: #94a3b8;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  tbody tr { border-bottom: 1px solid #1e293b; transition: background 0.15s; }
  tbody tr:hover { background: rgba(51, 65, 85, 0.3); }
  td { padding: 8px 12px; }
  .card-name-cell { font-weight: 600; }
  .muted { color: #94a3b8; }
  .btn-sm {
    padding: 3px 8px;
    font-size: 12px;
    border-radius: 4px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: #94a3b8;
  }
  .btn-sm:hover { color: #f1f5f9; }
  .btn-sm.delete:hover { color: #f87171; }

  .actions-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .btn-export { background: #2563eb; color: white; }
  .btn-export:hover { background: #1d4ed8; }
  .btn-submit { background: #16a34a; color: white; }
  .btn-submit:hover { background: #15803d; }
  .btn-submit:disabled { opacity: 0.5; cursor: default; }
  .btn-clear { background: #dc2626; color: white; }
  .btn-clear:hover { background: #b91c1c; }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: #64748b;
    font-size: 14px;
  }

  .loading-spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #475569;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.5s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>mtg card entry</h1>
  <p>set code + collector number lookup for tcg player listings</p>
</div>

<div class="main">
  <!-- Entry Panel -->
  <div class="panel">
    <div class="entry-row">
      <div class="field field-set">
        <label>set</label>
        <input type="text" id="setInput" placeholder="fin" maxlength="5"
          autocomplete="off" spellcheck="false">
      </div>
      <div class="field field-cn">
        <label>cn #</label>
        <input type="text" id="cnInput" placeholder="142" maxlength="6"
          autocomplete="off" spellcheck="false">
      </div>
      <button class="btn btn-lookup" id="lookupBtn" onclick="doLookup()">look up</button>
    </div>

    <!-- Voice input -->
    <div class="mic-row">
      <button class="mic-btn off" id="micBtn" onclick="toggleMic()">&#127908;</button>
      <div class="mic-status" id="micStatus">say set code and number, e.g. "fin 142"</div>
    </div>

    <!-- Preview -->
    <div class="preview" id="preview">
      <img class="preview-img" id="previewImg" src="" alt="">
      <div class="preview-info">
        <div class="preview-name" id="previewName"></div>
        <div class="preview-meta" id="previewMeta"></div>
        <div class="preview-fields">
          <div class="field">
            <label>printing</label>
            <select id="previewPrinting"></select>
          </div>
          <div class="field">
            <label>condition</label>
            <select id="previewCondition"></select>
          </div>
          <div class="field">
            <label>language</label>
            <select id="previewLanguage"></select>
          </div>
          <div class="field field-qty">
            <label>qty</label>
            <input type="number" id="previewQty" min="1" value="1">
          </div>
        </div>
        <div class="preview-actions">
          <button class="btn btn-add" onclick="addCard()">add to list</button>
          <button class="btn btn-skip" onclick="clearPreview()">skip</button>
        </div>
      </div>
    </div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- Stats & Table (hidden until cards exist) -->
  <div id="listSection" class="hidden">
    <div class="stats">
      <div class="stat">
        <div class="stat-label">unique cards</div>
        <div class="stat-value" id="uniqueCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">total quantity</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
    </div>

    <div class="actions-bar">
      <button class="btn btn-submit" id="submitBtn" onclick="submitToStore()">submit to store</button>
      <button class="btn btn-export" onclick="copyList()">copy list</button>
      <button class="btn btn-export" onclick="exportCSV()">export csv</button>
      <button class="btn btn-clear" onclick="clearAll()">clear all</button>
    </div>

    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>card</th>
              <th>set</th>
              <th>cn</th>
              <th>printing</th>
              <th>condition</th>
              <th>language</th>
              <th>qty</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="cardTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <p>no cards yet — enter a set code and collector number to start</p>
  </div>
</div>

<script type="module">
import {
  fetchCardByCollectorNumber,
  fetchCardByName,
  getCardFinishes,
  getCardImageUrl,
  getCardPrintingType,
  TCG_CONDITIONS,
  TCG_PRINTINGS,
  TCG_LANGUAGES,
} from 'https://bensonperry.com/shared/mtg.js';

// ---- State ----
let cards = [];
let nextId = 1;
let currentCard = null; // scryfall card object in preview

// ---- Persistence ----
const STORAGE_KEY = 'cardentry_cards';
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ cards, nextId }));
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data.cards)) {
      cards = data.cards;
      nextId = data.nextId || (cards.length ? Math.max(...cards.map(c => c.id)) + 1 : 1);
    }
  } catch (e) {}
}

// ---- DOM refs ----
const setInput = document.getElementById('setInput');
const cnInput = document.getElementById('cnInput');
const lookupBtn = document.getElementById('lookupBtn');
const preview = document.getElementById('preview');
const feedbackEl = document.getElementById('feedback');

// Populate dropdowns
const conditionSelect = document.getElementById('previewCondition');
TCG_CONDITIONS.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c; opt.textContent = c.toLowerCase();
  conditionSelect.appendChild(opt);
});

const langSelect = document.getElementById('previewLanguage');
TCG_LANGUAGES.forEach(l => {
  const opt = document.createElement('option');
  opt.value = l; opt.textContent = l.toLowerCase();
  langSelect.appendChild(opt);
});

// ---- Lookup ----
async function doLookup() {
  const set = setInput.value.trim();
  const cn = cnInput.value.trim();
  if (!set || !cn) {
    showFeedback('enter both set code and collector number', 'error');
    return;
  }

  lookupBtn.disabled = true;
  showFeedback('<span class="loading-spinner"></span> looking up ' + set + ' #' + cn + '...', 'info');

  const card = await fetchCardByCollectorNumber(set, cn);

  lookupBtn.disabled = false;

  if (!card) {
    showFeedback('no card found for ' + set + ' #' + cn, 'error');
    return;
  }

  showCardPreview(card);
  hideFeedback();

  // Focus qty for fast entry flow
  document.getElementById('previewQty').select();
}
window.doLookup = doLookup;

function showCardPreview(card) {
  currentCard = card;
  preview.classList.add('active');

  document.getElementById('previewImg').src = getCardImageUrl(card, 'normal') || '';
  document.getElementById('previewName').textContent = card.name;

  const meta = [card.set_name, card.type_line, card.rarity].filter(Boolean).join(' — ');
  document.getElementById('previewMeta').textContent = meta;

  // Populate printing options from card finishes
  const printingSelect = document.getElementById('previewPrinting');
  printingSelect.innerHTML = '';
  const finishes = getCardFinishes(card);
  for (const f of finishes) {
    const label = getCardPrintingType(card, f.finish);
    const priceStr = f.price ? ' ($' + f.price + ')' : '';
    const opt = document.createElement('option');
    opt.value = f.finish;
    opt.textContent = (label + priceStr).toLowerCase();
    printingSelect.appendChild(opt);
  }

  document.getElementById('previewQty').value = 1;
}

function clearPreview() {
  currentCard = null;
  preview.classList.remove('active');
  setInput.value = '';
  cnInput.value = '';
  setInput.focus();
}
window.clearPreview = clearPreview;

// ---- Add card ----
function addCard() {
  if (!currentCard) return;

  const finish = document.getElementById('previewPrinting').value;
  const entry = {
    id: nextId++,
    name: currentCard.name,
    set: currentCard.set.toUpperCase(),
    setName: currentCard.set_name,
    cn: currentCard.collector_number,
    printing: getCardPrintingType(currentCard, finish),
    condition: conditionSelect.value,
    language: langSelect.value,
    quantity: Math.max(1, parseInt(document.getElementById('previewQty').value, 10) || 1),
    scryfallId: currentCard.id,
  };

  cards.push(entry);
  save();
  renderTable();
  showFeedback('added ' + entry.name + ' (' + entry.set + ' #' + entry.cn + ')', 'success');

  // Reset for next card — keep set code since user likely entering from same set
  const prevSet = setInput.value;
  clearPreview();
  setInput.value = prevSet;
  cnInput.focus();
}
window.addCard = addCard;

// ---- Table rendering ----
function renderTable() {
  const tbody = document.getElementById('cardTableBody');
  const listSection = document.getElementById('listSection');
  const emptyState = document.getElementById('emptyState');

  if (cards.length === 0) {
    listSection.classList.add('hidden');
    emptyState.classList.remove('hidden');
    return;
  }

  listSection.classList.remove('hidden');
  emptyState.classList.add('hidden');

  document.getElementById('uniqueCount').textContent = cards.length;
  document.getElementById('totalCount').textContent = cards.reduce((s, c) => s + c.quantity, 0);

  tbody.innerHTML = cards.map(c => `
    <tr>
      <td class="card-name-cell">${esc(c.name)}</td>
      <td class="muted">${esc(c.set)}</td>
      <td class="muted">${esc(c.cn)}</td>
      <td class="muted">${esc(c.printing)}</td>
      <td class="muted">${esc(c.condition)}</td>
      <td class="muted">${esc(c.language)}</td>
      <td>${c.quantity}</td>
      <td><button class="btn-sm delete" onclick="deleteCard(${c.id})">x</button></td>
    </tr>
  `).join('');
}

function deleteCard(id) {
  cards = cards.filter(c => c.id !== id);
  save();
  renderTable();
}
window.deleteCard = deleteCard;

// ---- Export ----
function copyList() {
  const lines = cards.map(c =>
    [c.quantity, c.name, c.set, '#' + c.cn, c.printing, c.condition, c.language].join('\t')
  );
  navigator.clipboard.writeText(lines.join('\n'));
  showFeedback('copied ' + cards.length + ' cards to clipboard', 'success');
}
window.copyList = copyList;

function exportCSV() {
  const header = 'Quantity,Name,Set,Collector Number,Printing,Condition,Language';
  const rows = cards.map(c =>
    [c.quantity, '"' + c.name + '"', c.set, c.cn, c.printing, c.condition, c.language].join(',')
  );
  const csv = header + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'tcg-cards.csv'; a.click();
  URL.revokeObjectURL(url);
}
window.exportCSV = exportCSV;

const QUEUE_URL = 'https://cardentry-queue.bensonperry.workers.dev';

async function submitToStore() {
  if (cards.length === 0) {
    showFeedback('no cards to submit', 'error');
    return;
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'submitting...';
  try {
    const resp = await fetch(QUEUE_URL + '/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cards }),
    });
    const data = await resp.json();
    if (data.ok) {
      showFeedback('submitted ' + data.count + ' cards to store queue (id: ' + data.id + ')', 'success');
      cards = [];
      nextId = 1;
      save();
      renderTable();
    } else {
      showFeedback('submit failed: ' + (data.error || 'unknown'), 'error');
    }
  } catch (e) {
    showFeedback('submit failed: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = 'submit to store';
}
window.submitToStore = submitToStore;

function clearAll() {
  if (cards.length && !confirm('clear all ' + cards.length + ' cards?')) return;
  cards = [];
  nextId = 1;
  save();
  renderTable();
}
window.clearAll = clearAll;

// ---- Feedback ----
function showFeedback(html, type = 'info') {
  feedbackEl.innerHTML = html;
  feedbackEl.className = 'feedback active ' + type;
}

function hideFeedback() {
  feedbackEl.className = 'feedback';
}

// ---- Voice ----
let isListening = false;
let recognition = null;
let pendingTranscript = '';
let debounceTimer = null;
const DEBOUNCE_MS = 1200;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    let final = '';
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t + ' ';
      else interim += t;
    }
    if (final.trim()) {
      pendingTranscript += final;
      document.getElementById('micStatus').innerHTML =
        '<strong>heard:</strong> ' + esc(pendingTranscript.trim());

      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const text = pendingTranscript.trim();
        pendingTranscript = '';
        if (text.length > 1) parseVoice(text);
      }, DEBOUNCE_MS);
    }
    if (interim) {
      document.getElementById('micStatus').innerHTML =
        '<strong>...</strong> ' + esc((pendingTranscript + interim).trim());
    }
  };

  recognition.onend = () => {
    if (isListening) { try { recognition.start(); } catch(e) {} }
  };

  recognition.onerror = (event) => {
    if (event.error === 'not-allowed') {
      document.getElementById('micStatus').textContent = 'mic access denied — allow and reload';
    }
  };
}

function toggleMic() {
  if (!recognition) return;
  const btn = document.getElementById('micBtn');
  if (isListening) {
    isListening = false;
    recognition.stop();
    btn.className = 'mic-btn off';
    document.getElementById('micStatus').textContent = 'mic off';
  } else {
    isListening = true;
    recognition.start();
    btn.className = 'mic-btn on';
    document.getElementById('micStatus').textContent = 'listening...';
  }
}
window.toggleMic = toggleMic;

// Parse voice like "fin 142" or "FIN 142 foil" or "dft 53 lightly played"
function parseVoice(text) {
  // Clean up speech-to-text artifacts
  const clean = text.toLowerCase()
    .replace(/\b(um|uh|uhh|okay|ok)\b/g, '')
    .replace(/number\s*/g, '')
    .replace(/hashtag\s*/g, '')
    .replace(/pound\s*/g, '')
    .replace(/hash\s*/g, '')
    .replace(/\s+/g, ' ')
    .trim();

  // Try to extract: set code (2-5 letters) + collector number
  // Handles "fin 142", "fin142", "rvr216", "dft 53"
  const match = clean.match(/^([a-z]{2,5})\s*(\d{1,4}[a-z]?)\b/);
  if (match) {
    setInput.value = match[1];
    cnInput.value = match[2];
    doLookup();
  } else {
    showFeedback('couldn\'t parse "' + esc(text) + '" — say set code then number (e.g. "fin 142")', 'error');
  }
}

// ---- Keyboard shortcuts ----
setInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (cnInput.value.trim()) doLookup();
    else cnInput.focus();
  }
});
cnInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLookup();
});
document.getElementById('previewQty').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCard();
});

// ---- Util ----
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Load saved cards and focus
load();
renderTable();
setInput.focus();
</script>
</body>
</html>
