<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TCG Handoff</title>
    <meta name="description" content="A private TCGplayer packing handoff with cards and shipping addresses in one phone-friendly view." />
    <meta name="theme-color" content="#2457d6" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Card Mail" />
    <meta property="og:title" content="Card Mail" />
    <meta property="og:description" content="A private TCGplayer packing handoff with cards and shipping addresses in one phone-friendly view." />
    <meta property="og:url" content="https://bensonperry.com/tcgplayer-assistant/" />
    <meta property="og:image" content="https://bensonperry.com/tcgplayer-assistant/preview.png" />
    <meta property="og:image:secure_url" content="https://bensonperry.com/tcgplayer-assistant/preview.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Card Mail TCGplayer handoff preview" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Card Mail" />
    <meta name="twitter:description" content="A private TCGplayer packing handoff with cards and shipping addresses in one phone-friendly view." />
    <meta name="twitter:image" content="https://bensonperry.com/tcgplayer-assistant/preview.png" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=11" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div>
          <p class="eyebrow">TCGplayer handoff</p>
          <h1>Card Mail</h1>
        </div>
        <div class="actions">
          <label class="button primary" for="pdfInput">Import PDF</label>
          <input id="pdfInput" type="file" accept="application/pdf,.pdf" hidden />
          <button id="copyLinkButton" class="button" type="button" disabled>Copy Link</button>
          <button id="clearButton" class="button subtle" type="button" disabled>Clear</button>
        </div>
      </header>

      <section id="dropZone" class="drop-zone" aria-label="Import packing slip PDF">
        <strong>Drop packing-slip PDF</strong>
      </section>

      <section id="summary" class="summary" hidden></section>
      <main id="orders" class="orders" aria-label="Orders"></main>

      <section id="emptyState" class="empty-state">
        <h2>No orders yet</h2>
        <p>Import the TCGplayer packing-slip PDF.</p>
      </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./app.js?v=11"></script>
  </body>
</html>
