name: Update Sets
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update sets.json
        run: node scripts/update-sets.js

      - name: Commit if changed
        run: |
          if git diff --quiet shared/sets.json shared/metadata.json; then
            echo "No changes to sets.json or metadata.json."
            exit 0
          fi
          added=$(git diff shared/sets.json | grep -E '^\+\s+"code"' | sed -E 's/.*"code": "([^"]+)".*/\1/' | tr '\n' ',' | sed 's/,$//')
          removed=$(git diff shared/sets.json | grep -E '^-\s+"code"' | sed -E 's/.*"code": "([^"]+)".*/\1/' | tr '\n' ',' | sed 's/,$//')
          parts=""
          if ! git diff --quiet shared/sets.json; then
            parts="sets.json"
            if [ -n "$added" ]; then parts="$parts (+ $added)"; fi
            if [ -n "$removed" ]; then parts="$parts (- $removed)"; fi
          fi
          if ! git diff --quiet shared/metadata.json; then
            if [ -n "$parts" ]; then parts="$parts + metadata.json"; else parts="metadata.json"; fi
          fi
          msg="update $parts"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shared/sets.json shared/metadata.json
          git commit -m "$msg"
          git push
