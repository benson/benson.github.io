name: Update Sets
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update sets.json
        run: node scripts/update-sets.js

      - name: Commit if changed
        run: |
          git diff --quiet shared/sets.json && exit 0
          added=$(git diff shared/sets.json | grep -E '^\+\s+"code"' | sed -E 's/.*"code": "([^"]+)".*/\1/' | tr '\n' ',' | sed 's/,$//')
          removed=$(git diff shared/sets.json | grep -E '^-\s+"code"' | sed -E 's/.*"code": "([^"]+)".*/\1/' | tr '\n' ',' | sed 's/,$//')
          msg="update sets.json"
          if [ -n "$added" ]; then msg="$msg (+ $added)"; fi
          if [ -n "$removed" ]; then msg="$msg (- $removed)"; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shared/sets.json
          git commit -m "$msg"
          git push
