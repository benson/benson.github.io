name: MTG Collection Checks

on:
  push:
    paths:
      - 'mtgcollection/**'
      - 'shared/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mtgcollection-check.yml'
  pull_request:
    paths:
      - 'mtgcollection/**'
      - 'shared/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mtgcollection-check.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npm run check
