name: Lastlight Checks

on:
  push:
    paths:
      - 'lastlight/**'
      - '.github/workflows/lastlight-check.yml'
  pull_request:
    paths:
      - 'lastlight/**'
      - '.github/workflows/lastlight-check.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Syntax checks
        run: npm --prefix lastlight run check
      - name: Lastlight tests
        run: npm --prefix lastlight test
      - name: Deterministic fixture gates
        run: npm --prefix lastlight run fixtures:verify -- --report=artifacts/fixture-report.json
      - name: Install relay test dependencies
        run: npm ci --prefix lastlight/worker
      - name: Relay tests
        run: npm test --prefix lastlight/worker
      - name: Upload fixture report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lastlight-fixture-report
          path: lastlight/artifacts/fixture-report.json
          if-no-files-found: warn
          retention-days: 30
