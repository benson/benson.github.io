name = "mtgcollection-share"
main = "worker.js"
compatibility_date = "2024-12-01"

[vars]
CLERK_ISSUER = "https://clerk.bensonperry.com"
CLERK_AUTHORIZED_PARTIES = "https://bensonperry.com,http://127.0.0.1:8087,http://localhost:8087"
MCP_PUBLIC_ORIGIN = "https://mtgcollection-share.bensonperry.workers.dev"
# Configure after creating a Clerk OAuth application for MCP:
CLERK_FRONTEND_API_URL = "https://clerk.bensonperry.com"
CLERK_OAUTH_CLIENT_ID = "HNx2PbSrTQUcrsfd"
MTGCOLLECTION_CHAT_PROVIDER = "xai"
MTGCOLLECTION_CHAT_XAI_MODEL = "grok-4-fast-non-reasoning"
MTGCOLLECTION_CHAT_OPENAI_MODEL = "gpt-5-nano"
MTGCOLLECTION_CHAT_DAILY_LIMIT = "25"
MTGCOLLECTION_CHAT_MAX_OUTPUT_TOKENS = "1000"

# Run `wrangler kv:namespace create SHARES` to create this namespace, then
# paste the returned id here. Same for the preview namespace if you want
# `wrangler dev` to use a separate KV store.
[[kv_namespaces]]
binding = "SHARES"
id = "95781565fce640bdbb92d6866919d8b4"

# Stores MCP OAuth clients, authorization codes, access tokens, and refresh tokens.
# Create with: `wrangler kv:namespace create OAUTH_KV`
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "56b9488153ee482fa6a49a52a32dc0e8"

[[d1_databases]]
binding = "DB"
database_name = "mtgcollection-sync"
database_id = "059bb66c-e043-4afa-acf1-7e9e6cd9e88d"

[[durable_objects.bindings]]
name = "COLLECTION_SYNC"
class_name = "CollectionSyncObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollectionSyncObject"]
