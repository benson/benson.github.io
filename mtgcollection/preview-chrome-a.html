<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chrome a · border frame</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: "Times New Roman", Times, Georgia, serif;
    background: #f8f7f4;
    color: #000;
    text-transform: lowercase;
    font-size: 0.85rem;
  }

  .frame {
    height: 100vh;
    display: grid;
    grid-template-rows: 60px 1fr 40px;
    grid-template-columns: 200px 1fr 280px;
    grid-template-areas:
      "header header header"
      "left   main   right"
      "footer footer footer";
  }

  /* HEADER */
  .top {
    grid-area: header;
    border-bottom: 1px solid #000;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 20px;
    background: #f8f7f4;
  }
  .top h1 {
    font-size: 1.3rem;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  .top .totals {
    font-size: 0.85rem;
    letter-spacing: 0.02em;
    color: #333;
    text-align: center;
  }
  .top .totals strong {
    font-weight: 400;
    color: #000;
  }
  .top .totals .sep { color: #bbb; margin: 0 8px; }
  .top .view-mode {
    justify-self: end;
    display: flex;
    border: 1px solid #000;
    border-radius: 2px;
    overflow: hidden;
  }
  .top .view-mode button {
    background: transparent;
    border: none;
    padding: 5px 12px;
    font-family: inherit;
    font-size: 0.78rem;
    text-transform: lowercase;
    cursor: pointer;
    color: #000;
    border-right: 1px solid #000;
  }
  .top .view-mode button:last-child { border-right: none; }
  .top .view-mode button.active {
    background: #000;
    color: #fff;
  }

  /* LEFT SIDEBAR */
  .left {
    grid-area: left;
    border-right: 1px solid #000;
    padding: 18px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .left .label {
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    color: #999;
    margin-bottom: 4px;
    text-transform: lowercase;
  }
  .left input.search {
    background: transparent;
    border: none;
    border-bottom: 1px solid #000;
    padding: 4px 0;
    font-family: inherit;
    font-size: 0.85rem;
    color: #000;
    width: 100%;
    outline: none;
    text-transform: lowercase;
    border-radius: 0;
  }
  .left input.search::placeholder { color: #aaa; }
  .left .filters {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .left select {
    background: transparent;
    border: none;
    border-bottom: 1px solid #ddd;
    padding: 4px 0;
    font-family: inherit;
    font-size: 0.8rem;
    color: #333;
    width: 100%;
    outline: none;
    text-transform: lowercase;
    border-radius: 0;
    -webkit-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23999' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 2px center;
    cursor: pointer;
  }
  .left select:hover { border-bottom-color: #000; }
  .left .grid-size {
    display: flex;
    gap: 4px;
  }
  .left .grid-size button {
    flex: 1;
    background: transparent;
    border: 1px solid #ddd;
    padding: 5px 0;
    font-family: inherit;
    font-size: 0.78rem;
    cursor: pointer;
    color: #333;
    border-radius: 2px;
  }
  .left .grid-size button.active {
    border-color: #000;
    background: #000;
    color: #fff;
  }
  .left .format {
    margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid #eee;
  }

  /* MAIN */
  .main {
    grid-area: main;
    overflow-y: auto;
    padding: 18px 18px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .card {
    aspect-ratio: 488 / 680;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 6px;
    background: #ddd;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
  }
  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(255,255,255,0.18), rgba(0,0,0,0.18));
  }
  /* color rotation: W U B R G C */
  .card.c-w { background: linear-gradient(155deg, #f6efd9, #d8c98a); }
  .card.c-u { background: linear-gradient(155deg, #cfe1ee, #5b8bb1); }
  .card.c-b { background: linear-gradient(155deg, #888785, #2a2826); }
  .card.c-r { background: linear-gradient(155deg, #f0c0a4, #b04826); }
  .card.c-g { background: linear-gradient(155deg, #cadcb8, #5e8345); }
  .card.c-c { background: linear-gradient(155deg, #d6d2c6, #8b8579); }

  /* RIGHT SIDEBAR */
  .right {
    grid-area: right;
    border-left: 1px solid #000;
    overflow-y: auto;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .right h3 {
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    margin-bottom: 8px;
  }
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid #ddd;
    margin-bottom: 10px;
  }
  .tabs button {
    background: transparent;
    border: none;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 0.78rem;
    color: #888;
    cursor: pointer;
    text-transform: lowercase;
    border-bottom: 1px solid transparent;
    margin-bottom: -1px;
  }
  .tabs button.active {
    color: #000;
    border-bottom-color: #000;
  }
  .tab-body textarea {
    width: 100%;
    min-height: 80px;
    border: 1px solid #ccc;
    border-radius: 2px;
    padding: 6px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.7rem;
    resize: vertical;
    background: #fff;
    text-transform: none;
    outline: none;
  }
  .tab-body textarea:focus { border-color: #000; }
  .tab-body .row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .btn-mini {
    padding: 5px 10px;
    border: 1px solid #000;
    background: #000;
    color: #fff;
    font-family: inherit;
    font-size: 0.72rem;
    text-transform: lowercase;
    cursor: pointer;
    border-radius: 2px;
  }
  .btn-mini.secondary {
    background: transparent;
    color: #000;
  }
  .voice-mic {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 0;
  }
  .voice-mic .mic {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid #000;
    background: #fff;
    display: grid;
    place-items: center;
    font-size: 1.1rem;
    cursor: pointer;
  }
  .voice-mic .mic:hover { background: #000; color: #fff; }
  .voice-mic small { color: #999; font-size: 0.7rem; }
  .divider {
    height: 1px;
    background: #eee;
  }
  /* breakdown */
  .curve-row {
    display: grid;
    grid-template-columns: 22px 1fr 24px;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    color: #444;
    margin-bottom: 3px;
  }
  .curve-bucket { color: #999; }
  .curve-bar-wrap {
    background: #f1f1f1;
    height: 9px;
    border-radius: 1px;
    overflow: hidden;
  }
  .curve-bar { height: 100%; background: #222; }
  .curve-count { text-align: right; color: #666; font-variant-numeric: tabular-nums; }
  .breakdown-row {
    display: grid;
    grid-template-columns: 1fr 28px;
    font-size: 0.72rem;
    color: #444;
    margin: 2px 0;
  }
  .breakdown-row span:last-child {
    text-align: right;
    color: #666;
    font-variant-numeric: tabular-nums;
  }
  .stats-section + .stats-section { margin-top: 14px; }
  .stats-section-title {
    font-size: 0.66rem;
    letter-spacing: 0.05em;
    color: #999;
    margin-bottom: 8px;
  }
  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .donut-wrap svg {
    width: 70px;
    height: 70px;
    flex-shrink: 0;
  }
  .donut-legend {
    font-size: 0.68rem;
    color: #555;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px 6px;
    flex: 1;
  }
  .donut-legend .row {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .swatch {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.1);
    flex-shrink: 0;
  }

  /* FOOTER */
  .bottom {
    grid-area: footer;
    border-top: 1px solid #000;
    background: #f8f7f4;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    font-size: 0.78rem;
    color: #444;
  }
  .bottom .legal-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4a8;
    margin-right: 6px;
    vertical-align: middle;
  }
  .bottom .copy-btn {
    background: transparent;
    border: 1px solid #000;
    padding: 5px 12px;
    font-family: inherit;
    font-size: 0.75rem;
    text-transform: lowercase;
    cursor: pointer;
    border-radius: 2px;
  }
  .bottom .copy-btn:hover { background: #000; color: #fff; }
</style>
</head>
<body>
<div class="frame">
  <header class="top">
    <h1>mtg collection</h1>
    <div class="totals">
      <strong>347 cards</strong>
      <span class="sep">·</span>
      <strong>$2,889.40</strong>
    </div>
    <div class="view-mode">
      <button>list</button>
      <button class="active">grid</button>
      <button>deck</button>
    </div>
  </header>

  <aside class="left">
    <div>
      <div class="label">search</div>
      <input class="search" type="text" placeholder="card name, text, oracle...">
    </div>
    <div>
      <div class="label">filters</div>
      <div class="filters">
        <select><option>all colors</option></select>
        <select><option>all types</option></select>
        <select><option>all rarities</option></select>
        <select><option>all sets</option></select>
        <select><option>all locations</option></select>
        <select><option>any finish</option></select>
      </div>
    </div>
    <div>
      <div class="label">card size</div>
      <div class="grid-size">
        <button>s</button>
        <button class="active">m</button>
        <button>l</button>
      </div>
    </div>
    <div class="format">
      <div class="label">format</div>
      <select>
        <option>commander</option>
        <option>modern</option>
        <option>standard</option>
        <option>pioneer</option>
      </select>
    </div>
  </aside>

  <main class="main">
    <div class="card-grid" id="cards"></div>
  </main>

  <aside class="right">
    <section>
      <h3>add cards</h3>
      <div class="tabs">
        <button class="active">paste</button>
        <button>autocomplete</button>
        <button>voice</button>
      </div>
      <div class="tab-body">
        <textarea placeholder="1 lightning bolt&#10;2 brainstorm&#10;1 sol ring"></textarea>
        <div class="row">
          <button class="btn-mini">add 4 cards</button>
          <button class="btn-mini secondary">clear</button>
        </div>
      </div>
    </section>

    <div class="divider"></div>

    <section>
      <h3>breakdown</h3>
      <div class="stats-section">
        <div class="stats-section-title">mana curve</div>
        <div class="curve-row"><span class="curve-bucket">0</span><div class="curve-bar-wrap"><div class="curve-bar" style="width:18%"></div></div><span class="curve-count">3</span></div>
        <div class="curve-row"><span class="curve-bucket">1</span><div class="curve-bar-wrap"><div class="curve-bar" style="width:62%"></div></div><span class="curve-count">11</span></div>
        <div class="curve-row"><span class="curve-bucket">2</span><div class="curve-bar-wrap"><div class="curve-bar" style="width:90%"></div></div><span class="curve-count">16</span></div>
        <div class="curve-row"><span class="curve-bucket">3</span><div class="curve-bar-wrap"><div class="curve-bar" style="width:75%"></div></div><span class="curve-count">13</span></div>
        <div class="curve-row"><span class="curve-bucket">4</span><div class="curve-bar-wrap"><div class="curve-bar" style="width:48%"></div></div><span class="curve-count">8</span></div>
        <div class="curve-row"><span class="curve-bucket">5</span><div class="curve-bar-wrap"><div class="curve-bar" style="width:33%"></div></div><span class="curve-count">6</span></div>
        <div class="curve-row"><span class="curve-bucket">6</span><div class="curve-bar-wrap"><div class="curve-bar" style="width:22%"></div></div><span class="curve-count">4</span></div>
        <div class="curve-row"><span class="curve-bucket">7+</span><div class="curve-bar-wrap"><div class="curve-bar" style="width:12%"></div></div><span class="curve-count">2</span></div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">colors</div>
        <div class="donut-wrap">
          <svg viewBox="0 0 32 32">
            <circle r="16" cx="16" cy="16" fill="#888785"/>
            <circle r="8" cx="16" cy="16" fill="transparent"
              stroke="#f6efd9" stroke-width="16" stroke-dasharray="14 50.27" stroke-dashoffset="0" transform="rotate(-90 16 16)"/>
            <circle r="8" cx="16" cy="16" fill="transparent"
              stroke="#5b8bb1" stroke-width="16" stroke-dasharray="12 50.27" stroke-dashoffset="-14" transform="rotate(-90 16 16)"/>
            <circle r="8" cx="16" cy="16" fill="transparent"
              stroke="#b04826" stroke-width="16" stroke-dasharray="9 50.27" stroke-dashoffset="-26" transform="rotate(-90 16 16)"/>
            <circle r="8" cx="16" cy="16" fill="transparent"
              stroke="#5e8345" stroke-width="16" stroke-dasharray="10 50.27" stroke-dashoffset="-35" transform="rotate(-90 16 16)"/>
            <circle r="6" cx="16" cy="16" fill="#fff"/>
          </svg>
          <div class="donut-legend">
            <div class="row"><span class="swatch" style="background:#f6efd9"></span>w 14</div>
            <div class="row"><span class="swatch" style="background:#5b8bb1"></span>u 12</div>
            <div class="row"><span class="swatch" style="background:#888785"></span>b 18</div>
            <div class="row"><span class="swatch" style="background:#b04826"></span>r 9</div>
            <div class="row"><span class="swatch" style="background:#5e8345"></span>g 10</div>
            <div class="row"><span class="swatch" style="background:#d6d2c6"></span>c 7</div>
          </div>
        </div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">types</div>
        <div class="breakdown-row"><span>creatures</span><span>24</span></div>
        <div class="breakdown-row"><span>instants</span><span>12</span></div>
        <div class="breakdown-row"><span>sorceries</span><span>9</span></div>
        <div class="breakdown-row"><span>lands</span><span>36</span></div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">rarity</div>
        <div class="breakdown-row"><span>common</span><span>32</span></div>
        <div class="breakdown-row"><span>uncommon</span><span>28</span></div>
        <div class="breakdown-row"><span>rare</span><span>22</span></div>
        <div class="breakdown-row"><span>mythic</span><span>8</span></div>
      </div>
    </section>
  </aside>

  <footer class="bottom">
    <div><span class="legal-dot"></span>100 cards · all legal in commander</div>
    <button class="copy-btn">copy decklist</button>
  </footer>
</div>

<script>
  // generate 80 placeholder cards with rotating color classes
  const colors = ['c-w', 'c-u', 'c-b', 'c-r', 'c-g', 'c-c'];
  const grid = document.getElementById('cards');
  for (let i = 0; i < 80; i++) {
    const d = document.createElement('div');
    d.className = 'card ' + colors[i % colors.length];
    grid.appendChild(d);
  }
</script>
</body>
</html>
