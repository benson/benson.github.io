<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mtg collection — chrome shadow variants</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #f8f7f4;
    color: #111;
    text-transform: lowercase;
    line-height: 1.4;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ───── variant toolbar (fixed strip at the top) ───── */
  .variant-toolbar {
    flex: 0 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 14px 22px;
    align-items: flex-start;
    padding: 12px 16px;
    background: #ece9df;
    border-bottom: 1px solid #d8d4c8;
    font-size: 0.78rem;
  }
  .toolbar-group { display: flex; flex-direction: column; gap: 5px; }
  .toolbar-label {
    font-size: 0.62rem;
    color: #888;
    letter-spacing: 0.06em;
  }
  .toolbar-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .pill-btn {
    appearance: none;
    border: 1px solid #c9c4b5;
    background: #fff;
    color: #222;
    font: inherit;
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 999px;
    cursor: pointer;
    text-transform: lowercase;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .pill-btn:hover { background: #f0ece0; }
  .pill-btn.active { background: #000; color: #fff; border-color: #000; }
  .css-readout {
    flex: 1 1 280px;
    min-width: 240px;
    background: #fff;
    border: 1px solid #d8d4c8;
    border-radius: 6px;
    padding: 8px 10px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 0.7rem;
    color: #333;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 110px;
    overflow-y: auto;
  }
  .css-readout .css-name {
    font-weight: 600;
    color: #111;
    margin-right: 8px;
  }
  .css-readout .css-desc {
    font-family: ui-sans-serif, system-ui, sans-serif;
    color: #666;
    font-size: 0.7rem;
    display: block;
    margin-top: 2px;
  }

  /* ───── app shell (replica of the live list view) ───── */
  .app-shell {
    flex: 1 1 auto;
    display: grid;
    grid-template-rows: 60px 1fr 40px;
    grid-template-columns: 200px 1fr;
    grid-template-areas:
      "header header"
      "left   main"
      "footer footer";
    min-height: 0;
    background: #f8f7f4;
  }

  .app-header {
    grid-area: header;
    background: #f8f7f4;
    border-bottom: 1px solid #000;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 20px;
    gap: 18px;
    z-index: 5;
    position: relative;
  }
  .app-header h1 {
    font-size: 1.3rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .app-header-totals {
    text-align: center;
    font-size: 0.85rem;
    color: #333;
    display: inline-flex;
    align-items: baseline;
    justify-content: center;
    gap: 8px;
  }
  .app-header-totals strong { font-weight: 400; color: #000; font-variant-numeric: tabular-nums; }
  .app-header-totals .stat-label { font-size: 0.65rem; letter-spacing: 0.04em; color: #999; margin-right: 2px; }
  .app-header-totals .sep { color: #ccc; }
  .app-header-views {
    justify-self: end;
    display: inline-flex;
    border: 1px solid #000;
    border-radius: 2px;
    overflow: hidden;
  }
  .toggle-view {
    background: transparent;
    border: none;
    border-right: 1px solid #000;
    border-radius: 0;
    padding: 5px 12px;
    font-family: inherit;
    font-size: 0.78rem;
    text-transform: lowercase;
    cursor: pointer;
    color: #000;
  }
  .toggle-view:last-child { border-right: none; }
  .toggle-view.active { background: #000; color: #fff; }

  .app-left {
    grid-area: left;
    background: #f8f7f4;
    border-right: 1px solid #000;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    z-index: 4;
    position: relative;
  }
  .sidebar-label {
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    color: #999;
    margin-bottom: 4px;
  }
  .sidebar-search {
    border: none;
    border-bottom: 1px solid #000;
    background: transparent;
    padding: 4px 0;
    font: inherit;
    font-size: 0.85rem;
    width: 100%;
    outline: none;
  }
  .sidebar-filter {
    border: none;
    border-bottom: 1px solid #ddd;
    background: transparent;
    padding: 3px 0;
    font: inherit;
    font-size: 0.78rem;
    color: #555;
  }

  .app-center {
    grid-area: main;
    overflow-y: auto;
    min-width: 0;
    padding: 0;
    scrollbar-width: thin;
  }

  .app-footer {
    grid-area: footer;
    background: #f8f7f4;
    border-top: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 0.75rem;
    color: #444;
    z-index: 5;
    position: relative;
  }
  .app-footer-storage { color: #999; font-size: 0.7rem; }
  .app-footer-right { display: flex; gap: 10px; align-items: center; }

  /* ───── list table (replicates list view) ───── */
  .list-view { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .list-view thead th {
    position: sticky;
    top: 0;
    background: #f8f7f4;
    text-align: left;
    font-weight: 500;
    color: #555;
    padding: 8px 10px;
    box-shadow: inset 0 -1px 0 #000;
    font-size: 0.72rem;
    letter-spacing: 0.02em;
    z-index: 2;
  }
  .list-view tbody td {
    padding: 7px 10px;
    border-bottom: 1px solid #ececec;
    color: #222;
    vertical-align: middle;
  }
  .list-view tbody tr:hover { background: #f3f0e6; }
  .list-view td.muted { color: #777; }
  .list-view td.set-cell { text-transform: uppercase; font-size: 0.74rem; letter-spacing: 0.04em; }
  .list-view td.qty-cell { font-variant-numeric: tabular-nums; }
  .list-view .row-tag {
    background: #f0ece0;
    color: #333;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 0.7rem;
    margin-right: 4px;
  }
  .list-view .loc-pill {
    display: inline-block;
    background: #efe6d4;
    color: #333;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 0.7rem;
  }

  /* ──────────────────────────────────────────────────
     SHADOW VARIANTS (applied via body.variant-X)
     Targets: .app-header, .app-left, .app-footer borders
     ────────────────────────────────────────────────── */

  /* v0 — none: current live state, hard 1px black borders */

  /* v1 — soft inward: keep border, add gentle inward-cast shadow */
  body.v-soft-inward .app-header { box-shadow: 0 4px 8px -3px rgba(0,0,0,0.10); }
  body.v-soft-inward .app-left   { box-shadow: 4px 0 8px -3px rgba(0,0,0,0.08); }
  body.v-soft-inward .app-footer { box-shadow: 0 -4px 8px -3px rgba(0,0,0,0.08); }

  /* v2 — soft inward, no line: drop the black 1px in favor of shadow alone */
  body.v-soft-no-line .app-header { border-bottom: none; box-shadow: 0 4px 10px -2px rgba(0,0,0,0.12); }
  body.v-soft-no-line .app-left   { border-right: none;  box-shadow: 6px 0 10px -3px rgba(0,0,0,0.10); }
  body.v-soft-no-line .app-footer { border-top: none;    box-shadow: 0 -4px 10px -2px rgba(0,0,0,0.10); }

  /* v3 — inset well: borders stay; center looks recessed via inset shadow */
  body.v-inset-well .app-center {
    box-shadow:
      inset 0 6px 8px -6px rgba(0,0,0,0.18),
      inset 6px 0 8px -6px rgba(0,0,0,0.14),
      inset 0 -6px 8px -6px rgba(0,0,0,0.14);
  }

  /* v4 — inset well, no line: recessed center, no hard frame */
  body.v-inset-no-line .app-header { border-bottom: none; }
  body.v-inset-no-line .app-left   { border-right: none; }
  body.v-inset-no-line .app-footer { border-top: none; }
  body.v-inset-no-line .app-center {
    box-shadow:
      inset 0 8px 10px -6px rgba(0,0,0,0.20),
      inset 8px 0 10px -6px rgba(0,0,0,0.16),
      inset 0 -8px 10px -6px rgba(0,0,0,0.16);
  }

  /* v5 — edge fade: replace black borders with a soft gradient fade */
  body.v-edge-fade .app-header {
    border-bottom: none;
    background: linear-gradient(#f8f7f4 0%, #f8f7f4 calc(100% - 8px), rgba(0,0,0,0.12) 100%);
  }
  body.v-edge-fade .app-left {
    border-right: none;
    background: linear-gradient(to right, #f8f7f4 0%, #f8f7f4 calc(100% - 8px), rgba(0,0,0,0.10) 100%);
  }
  body.v-edge-fade .app-footer {
    border-top: none;
    background: linear-gradient(#f8f7f4 0%, rgba(0,0,0,0.10) 8px, #f8f7f4 8px, #f8f7f4 100%);
    box-shadow: 0 -1px 0 rgba(0,0,0,0); /* placeholder */
  }
  /* Smarter footer fade: gradient at top inside the strip */
  body.v-edge-fade .app-footer {
    background:
      linear-gradient(rgba(0,0,0,0.10), rgba(0,0,0,0)) top/100% 6px no-repeat,
      #f8f7f4;
  }

  /* v6 — lifted chrome: chrome surfaces feel like raised cards above the center */
  body.v-lifted .app-header {
    border-bottom: none;
    background: #fcfbf7;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 6px 12px -2px rgba(0,0,0,0.10);
  }
  body.v-lifted .app-left {
    border-right: none;
    background: #fcfbf7;
    box-shadow: 1px 0 0 rgba(0,0,0,0.04), 6px 0 12px -2px rgba(0,0,0,0.08);
  }
  body.v-lifted .app-footer {
    border-top: none;
    background: #fcfbf7;
    box-shadow: 0 -1px 0 rgba(0,0,0,0.04), 0 -6px 12px -2px rgba(0,0,0,0.08);
  }
  body.v-lifted .app-center { background: #f4f1ea; }
  body.v-lifted .list-view thead th { background: #f4f1ea; }

  /* v7 — warm soft: subtle warm-tinted soft drop, keep the line */
  body.v-warm .app-header { box-shadow: 0 4px 10px -3px rgba(80,60,40,0.14); }
  body.v-warm .app-left   { box-shadow: 4px 0 10px -3px rgba(80,60,40,0.10); }
  body.v-warm .app-footer { box-shadow: 0 -4px 10px -3px rgba(80,60,40,0.10); }

  /* v8 — hairline + glow: replace black with a 1px hairline + diffuse glow */
  body.v-hairline .app-header { border-bottom: 1px solid rgba(0,0,0,0.18); box-shadow: 0 3px 8px -3px rgba(0,0,0,0.10); }
  body.v-hairline .app-left   { border-right: 1px solid rgba(0,0,0,0.16);  box-shadow: 3px 0 8px -3px rgba(0,0,0,0.08); }
  body.v-hairline .app-footer { border-top: 1px solid rgba(0,0,0,0.18);    box-shadow: 0 -3px 8px -3px rgba(0,0,0,0.08); }

  @media (max-width: 700px) {
    .app-shell { grid-template-columns: 1fr; grid-template-areas: "header" "main" "footer"; }
    .app-left { display: none; }
  }
</style>
</head>
<body class="v-soft-inward">

<div class="variant-toolbar">
  <div class="toolbar-group">
    <span class="toolbar-label">chrome shadow</span>
    <div class="toolbar-row" id="variantRow"></div>
  </div>
  <div class="css-readout" id="cssReadout"></div>
</div>

<div class="app-shell">
  <header class="app-header">
    <h1>mtg collection</h1>
    <div class="app-header-totals">

</div>

<script>

    { key: 'none',           label: 'none',           desc: 'baseline — current live behavior. hard 1px #000 frame, no shadow.', css: '/* current */\n.app-header { border-bottom: 1px solid #000; }\n.app-left   { border-right:  1px solid #000; }\n.app-footer { border-top:    1px solid #000; }' },
    { key: 'v-soft-inward',  label: 'soft inward',    desc: 'keep the black frame, add a gentle inward shadow so chrome casts onto the content well.', css: '.app-header { box-shadow: 0 4px 8px -3px rgba(0,0,0,0.10); }\n.app-left   { box-shadow: 4px 0 8px -3px rgba(0,0,0,0.08); }\n.app-footer { box-shadow: 0 -4px 8px -3px rgba(0,0,0,0.08); }' },
    { key: 'v-soft-no-line', label: 'soft, no line',  desc: 'drop the hard black border entirely; shadow alone separates chrome from content.', css: '.app-header { border-bottom: none; box-shadow: 0 4px 10px -2px rgba(0,0,0,0.12); }\n.app-left   { border-right:  none; box-shadow: 6px 0 10px -3px rgba(0,0,0,0.10); }\n.app-footer { border-top:    none; box-shadow: 0 -4px 10px -2px rgba(0,0,0,0.10); }' },
    { key: 'v-inset-well',   label: 'inset well',     desc: 'frame stays; the center panel gets an inset shadow so it reads as recessed.', css: '.app-center {\n  box-shadow:\n    inset 0 6px 8px -6px rgba(0,0,0,0.18),\n    inset 6px 0 8px -6px rgba(0,0,0,0.14),\n    inset 0 -6px 8px -6px rgba(0,0,0,0.14);\n}' },
    { key: 'v-inset-no-line',label: 'inset, no line', desc: 'recessed center without the black frame — softest, least architectural option.', css: '/* borders removed; .app-center inset shadow only */\n.app-center {\n  box-shadow:\n    inset 0 8px 10px -6px rgba(0,0,0,0.20),\n    inset 8px 0 10px -6px rgba(0,0,0,0.16),\n    inset 0 -8px 10px -6px rgba(0,0,0,0.16);\n}' },
    { key: 'v-edge-fade',    label: 'edge fade',      desc: 'replace each border with a short gradient fade at the chrome edge — softer than a line, no shadow.', css: '.app-header { background: linear-gradient(#f8f7f4 calc(100% - 8px), rgba(0,0,0,0.12) 100%); }\n.app-left   { background: linear-gradient(to right, #f8f7f4 calc(100% - 8px), rgba(0,0,0,0.10) 100%); }\n.app-footer { background: linear-gradient(rgba(0,0,0,0.10), rgba(0,0,0,0)) top/100% 6px no-repeat, #f8f7f4; }' },
    { key: 'v-lifted',       label: 'lifted chrome',  desc: 'chrome surfaces become slightly lighter & cast outward — they read as raised above the center.', css: '.app-header { background: #fcfbf7; box-shadow: 0 6px 12px -2px rgba(0,0,0,0.10); }\n.app-left   { background: #fcfbf7; box-shadow: 6px 0 12px -2px rgba(0,0,0,0.08); }\n.app-footer { background: #fcfbf7; box-shadow: 0 -6px 12px -2px rgba(0,0,0,0.08); }\n.app-center { background: #f4f1ea; }' },
    { key: 'v-warm',         label: 'warm',           desc: 'soft inward shadow tinted toward brown so it harmonizes with the cream background.', css: '.app-header { box-shadow: 0 4px 10px -3px rgba(80,60,40,0.14); }\n.app-left   { box-shadow: 4px 0 10px -3px rgba(80,60,40,0.10); }\n.app-footer { box-shadow: 0 -4px 10px -3px rgba(80,60,40,0.10); }' },
    { key: 'v-hairline',     label: 'hairline + glow',desc: 'soften the black to a low-opacity hairline and add a small diffuse glow — a quieter version of the current frame.', css: '.app-header { border-bottom: 1px solid rgba(0,0,0,0.18); box-shadow: 0 3px 8px -3px rgba(0,0,0,0.10); }\n.app-left   { border-right:  1px solid rgba(0,0,0,0.16); box-shadow: 3px 0 8px -3px rgba(0,0,0,0.08); }\n.app-footer { border-top:    1px solid rgba(0,0,0,0.18); box-shadow: 0 -3px 8px -3px rgba(0,0,0,0.08); }' }
  ];

  // sample rows — fixed dataset so the visual evaluation is consistent regardless of the user's collection
  const ROWS = [

    { name: 'Goblin Guide',             set: 'zen', cn: '130', finish: 'nonfoil', rarity: 'r', cond: 'nm', loc: 'deck:burn',  tags: ['red','aggro'],      qty: 4, price: '$10.00' },

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
  }

  function renderRows() {
    const html = ROWS.map(r => `
      <tr>
        <td>${escapeHtml(r.name)}</td>
        <td class="muted set-cell">${escapeHtml(r.set)}</td>
        <td class="muted">${escapeHtml(r.cn)}</td>
        <td class="muted">${escapeHtml(r.finish)}</td>
        <td class="muted">${escapeHtml(r.rarity)}</td>
        <td class="muted">${escapeHtml(r.cond)}</td>
        <td><span class="loc-pill">${escapeHtml(r.loc)}</span></td>
        <td>${r.tags.map(t => `<span class="row-tag">${escapeHtml(t)}</span>`).join('')}</td>
        <td class="qty-cell">${r.qty}</td>
        <td class="muted">${escapeHtml(r.price)}</td>
      </tr>
    `).join('');
    document.getElementById('listBody').innerHTML = html;
  }

  function renderVariantButtons() {
    document.getElementById('variantRow').innerHTML = VARIANTS.map(v =>
      `<button class="pill-btn" data-variant="${v.key}">${v.label}</button>`
    ).join('');
  }

  function applyVariant(key) {
    document.body.classList.forEach(cls => {
      if (cls.startsWith('v-')) document.body.classList.remove(cls);
    });
    if (key !== 'none') document.body.classList.add(key);

    document.querySelectorAll('#variantRow .pill-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.variant === key);
    });

    const v = VARIANTS.find(x => x.key === key);
    document.getElementById('cssReadout').innerHTML =
      `<span class="css-name">${escapeHtml(v.label)}</span>${escapeHtml(v.css)}<span class="css-desc">${escapeHtml(v.desc)}</span>`;
    try { localStorage.setItem('mtgcollection_chrome_variant', key); } catch (_) {}
  }

  document.getElementById('variantRow').addEventListener('click', e => {
    const btn = e.target.closest('[data-variant]');
    if (btn) applyVariant(btn.dataset.variant);
  });

  renderVariantButtons();
  renderRows();
  const remembered = (() => {
    try { return localStorage.getItem('mtgcollection_chrome_variant'); } catch (_) { return null; }
  })();
  applyVariant(remembered && VARIANTS.find(v => v.key === remembered) ? remembered : 'v-soft-inward');
</script>
