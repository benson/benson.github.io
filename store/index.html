<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>store | benson perry</title>
  <meta name="description" content="small-batch shirts and useful little objects by benson perry">
  <meta property="og:title" content="store | benson perry">
  <meta property="og:description" content="small-batch shirts and useful little objects">
  <meta property="og:url" content="https://bensonperry.com/store/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://bensonperry.com/store/assets/sample-shirt.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">benson perry</a>
    <nav aria-label="store links">
      <button id="cart-toggle" class="nav-button" type="button">cart <span id="cart-count">0</span></button>
      <a href="mailto:benson.perry@gmail.com">contact</a>
    </nav>
  </header>

  <main>
    <section class="store-hero" aria-labelledby="store-title">
      <div>
        <p class="kicker">small useful objects</p>
        <h1 id="store-title">store</h1>
      </div>
      <p class="hero-copy">shirts and other small things that felt better as objects than as passing thoughts.</p>
    </section>

    <section class="catalog-bar" aria-label="product filters">
      <button class="filter-button is-active" type="button" data-filter="all" aria-pressed="true">all</button>
      <button class="filter-button" type="button" data-filter="apparel" aria-pressed="false">apparel</button>
      <button class="filter-button" type="button" data-filter="tabletop" aria-pressed="false">tabletop</button>
      <button class="filter-button" type="button" data-filter="accessories" aria-pressed="false">accessories</button>
    </section>

    <section id="product-grid" class="product-grid" aria-live="polite"></section>
  </main>

  <template id="product-template">
    <article class="product-card">
      <a class="product-image-link" href="#">
        <img class="product-image" src="" alt="" loading="lazy">
      </a>
      <div class="product-body">
        <div class="product-meta">
          <span class="product-type"></span>
          <span class="product-price"></span>
        </div>
        <h2 class="product-title"></h2>
        <p class="product-summary"></p>
        <ul class="product-details"></ul>
        <label class="variant-field">
          size
          <select class="variant-select"></select>
        </label>
        <button class="buy-link product-action" type="button">add to cart</button>
      </div>
    </article>
  </template>

  <aside id="checkout-panel" class="checkout-panel" aria-labelledby="checkout-title" aria-hidden="true">
    <div class="checkout-backdrop" data-close-checkout></div>
    <section class="checkout-sheet">
      <div class="checkout-heading">
        <div>
          <p class="kicker">on-site checkout</p>
          <h2 id="checkout-title">cart</h2>
        </div>
        <button class="icon-button" type="button" aria-label="close cart" data-close-checkout>x</button>
      </div>
      <div id="cart-lines" class="cart-lines"></div>
      <div class="cart-total">
        <span>subtotal</span>
        <strong id="cart-subtotal">$0</strong>
      </div>
      <p id="checkout-note" class="checkout-note"></p>
      <button id="checkout-button" class="checkout-button" type="button">checkout here</button>
      <div id="embedded-checkout" class="embedded-checkout" hidden></div>
    </section>
  </aside>

  <script>
    window.STORE_API_BASE = window.location.hostname === "localhost"
      ? ""
      : "https://benson-store-checkout-api.bensonperry.workers.dev";
  </script>
  <script src="app.js" type="module"></script>
</body>
</html>
